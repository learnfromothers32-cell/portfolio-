version: "3.8"

services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    command: npm run dev -- --host
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - mern_network

  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:               # ← add this
      - ./server/.env       # ← points to your .env file
    environment:
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - mern_network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - mern_network

volumes:
  mongo_data:

networks:
  mern_network:
    driver: bridge